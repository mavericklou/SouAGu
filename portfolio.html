<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.subtitle { font-size: 14px; font-weight: 400; color: #999; margin-bottom: 16px; }
.form-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; position: relative; }
.form-row input { flex: 1; min-width: 60px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
.form-row input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.12); }
.form-row button { padding: 8px 18px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.form-row button:hover { background: #1557b0; }
.form-row button:disabled { background: #bbb; cursor: default; }
.actions { display: flex; gap: 8px; margin-bottom: 12px; }
.actions button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; cursor: pointer; background: #fff; }
.actions button:hover { background: #f0f0f0; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
th, td { padding: 9px 8px; text-align: right; font-size: 13px; }
th { background: #fafafa; font-weight: 500; color: #666; text-align: right; white-space: nowrap; }
td:first-child, th:first-child { text-align: left; }
td .ac-code { color: #999; font-size: 11px; }
tr { border-bottom: 1px solid #f0f0f0; }
tr:last-child { border-bottom: none; }
.del { cursor: pointer; color: #e74c3c; font-size: 16px; padding: 0 4px; opacity: 0.4; }
.del:hover { opacity: 1; }
.up { color: #e74c3c; }
.down { color: #27ae60; }
.flat { color: #999; }
.summary { display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; flex-wrap: wrap; }
.summary span { font-weight: 600; }
.status { font-size: 12px; color: #999; margin-bottom: 10px; }
.error { color: #e74c3c; font-size: 12px; }
.empty { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
#stockSearchContainer { flex: 2; min-width: 120px; }
@media (max-width: 600px) {
  body { padding: 12px; }
  .form-row input { min-width: 45px; font-size: 13px; padding: 7px 8px; }
  #stockSearchContainer { min-width: 90px; }
  .form-row { gap: 4px; }
  th, td { padding: 6px 4px; font-size: 12px; }
  .summary { gap: 10px; font-size: 13px; flex-direction: column; }
}
</style>
</head>
<body>

<h1>📊 持仓助手</h1>
<div class="subtitle">支持代码/名称/拼音搜索 — 双击可开，无需服务器</div>

<div class="form-row">
  <div id="stockSearchContainer"></div>
  <input id="qty" type="number" placeholder="持股数" style="flex:0.7">
  <input id="cost" type="number" step="0.001" placeholder="成本价" style="flex:0.7">
  <button id="addBtn" disabled>添加</button>
</div>

<div class="actions">
  <button id="refreshBtn">🔄 刷新</button>
  <button id="clearBtn">🗑 清空</button>
</div>

<div class="summary" id="summary"></div>
<div class="status" id="status">加载中...</div>

<table>
  <thead>
    <tr>
      <th>股票</th>
      <th>持股</th>
      <th>成本</th>
      <th>现价</th>
      <th>涨跌</th>
      <th>持仓金额</th>
      <th>盈亏</th>
      <th>收益率</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="empty" id="empty">在搜索框输入股票开始添加</div>

<!-- 通过 jsDelivr CDN 加载（无需下载，双击即可用） -->
<script src="https://cdn.jsdelivr.net/gh/mavericklou/SouAGu@v0.0.1/stocks-data.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mavericklou/SouAGu@v0.0.1/SouAGu.js"></script>
<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'portfolio_holdings';
  var selectedStock = null;
  var prices = {};

  /* -------- SouAGu 组件 -------- */
  var ss = new SouAGu('#stockSearchContainer', {
    placeholder: '股票代码/名称/拼音, e.g. 600036 / 招商 / ZSYH',
    width: '100%',
    zIndex: '100',
    theme: 'light'
  });

  // 从全局变量加载数据（file:// 兼容）
  ss.setData(window.__STOCKS_DATA);
  document.getElementById('status').textContent = '就绪 (' + ss.getData().length + '只股票)';

  ss.onSelect(function(stock) {
    selectedStock = stock;
    document.getElementById('addBtn').disabled = false;
    document.getElementById('qty').focus();
  });

  /* -------- Keydown 处理 -------- */
  document.getElementById('qty').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addStock();
  });
  document.getElementById('cost').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addStock();
  });

  /* -------- 存储 -------- */
  function loadList() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
  }
  function saveList(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function render() {
    var list = loadList();
    var tbody = document.getElementById('tbody');
    var empty = document.getElementById('empty');
    var summary = document.getElementById('summary');

    if (list.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      summary.innerHTML = '';
      return;
    }
    empty.style.display = 'none';

    var totalCost = 0, totalMv = 0, totalPl = 0;
    var FEE_BUY = 0.00008;
    var FEE_SELL = 0.00008;
    var STAMP = 0.0005;

    var rows = list.map(function(s, i) {
      var p = prices[s.code];
      var price = p ? p.price : s.lastPrice;
      var changePct = p ? p.changePct : s.lastChangePct;
      var costVal = s.qty * s.cost;
      var buyFee = costVal * FEE_BUY;
      var costWithFees = costVal + buyFee;
      var mv = s.qty * (price || 0);
      var sellFee = mv * FEE_SELL;
      var stampDuty = mv * STAMP;
      var netVal = mv - sellFee - stampDuty;
      var pl = price ? (netVal - costWithFees) : 0;
      if (price) { totalCost += costWithFees; totalMv += mv; totalPl += pl; }

      var cls = price ? (pl > 0 ? 'up' : pl < 0 ? 'down' : 'flat') : '';
      return '<tr>' +
        '<td>' + s.name + '<span class="ac-code"> ' + s.code + '</span></td>' +
        '<td>' + fmt0(s.qty) + '</td>' +
        '<td>' + fmt(s.cost) + '</td>' +
        '<td>' + (price ? fmt(price) : '<span class="flat">--</span>') + '</td>' +
        '<td class="' + (changePct > 0 ? 'up' : changePct < 0 ? 'down' : 'flat') + '">' + (changePct != null ? (changePct > 0 ? '+' : '') + changePct.toFixed(2) + '%' : '--') + '</td>' +
        '<td>' + (price ? fmt(mv) : '<span class="flat">--</span>') + '</td>' +
        '<td class="' + cls + '">' + (price ? (pl > 0 ? '+' : '') + fmt(pl) : '--') + '</td>' +
        '<td class="' + cls + '">' + (price ? (plPct(netVal, costWithFees) > 0 ? '+' : '') + plPct(netVal, costWithFees).toFixed(2) + '%' : '--') + '</td>' +
        '<td><span class="del" data-index="' + i + '">✕</span></td>' +
      '</tr>';
    });
    tbody.innerHTML = rows.join('');

    // Bind delete clicks
    tbody.querySelectorAll('.del').forEach(function(el) {
      el.addEventListener('click', function() { removeStock(parseInt(el.dataset.index)); });
    });

    var totalPlPctVal = totalCost ? (totalPl / totalCost * 100) : 0;
    var cls = totalPl > 0 ? 'up' : totalPl < 0 ? 'down' : '';
    summary.innerHTML = '' +
      '<span>总成本: ' + fmt(totalCost) + '</span>' +
      '<span>总市值: ' + fmt(totalMv) + '</span>' +
      '<span class="' + cls + '">总盈亏: ' + (totalPl >= 0 ? '+' : '') + fmt(totalPl) + ' (' + (totalPlPctVal >= 0 ? '+' : '') + totalPlPctVal.toFixed(2) + '%)</span>';

    // Persist lastPrice
    var list2 = loadList();
    var changed = false;
    for (var i = 0; i < list2.length; i++) {
      var s = list2[i];
      var p = prices[s.code];
      if (p) {
        if (s.lastPrice !== p.price) { s.lastPrice = p.price; changed = true; }
        if (s.lastChangePct !== p.changePct) { s.lastChangePct = p.changePct; changed = true; }
      }
    }
    if (changed) saveList(list2);
  }

  function plPct(price, cost) { return cost ? ((price - cost) / cost * 100) : 0; }
  function fmt(n) { return n === undefined || n === null ? '--' : n.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function fmt0(n) { return n === undefined || n === null ? '--' : n.toLocaleString('zh-CN', {minimumFractionDigits:0, maximumFractionDigits:0}); }

  function addStock() {
    if (!selectedStock) return;
    var s = selectedStock;
    var qty = parseFloat(document.getElementById('qty').value);
    var cost = parseFloat(document.getElementById('cost').value);
    if (!qty || !cost) return;

    var list = loadList();
    list.push({ code: s.c, name: s.n, qty: qty, cost: cost, lastPrice: null, lastChangePct: null });
    saveList(list);

    ss.clear();
    document.getElementById('qty').value = '';
    document.getElementById('cost').value = '';
    document.getElementById('addBtn').disabled = true;
    selectedStock = null;
    document.getElementById('qty').focus();

    render();
    refreshPrices();
  }

  function removeStock(i) {
    var list = loadList();
    list.splice(i, 1);
    saveList(list);
    render();
  }

  function clearAll() {
    if (!confirm('确认清空所有持仓？')) return;
    saveList([]);
    prices = {};
    render();
    document.getElementById('status').textContent = '已清空';
  }

  function refreshAll() {
    refreshPrices().then(function() { render(); });
  }

  /* -------- Price fetch via Tencent HTTPS API -------- */
  function refreshPrices() {
    return new Promise(function(resolve) {
      var list = loadList();
      if (list.length === 0) { resolve(); return; }

      var status = document.getElementById('status');
      status.textContent = '获取行情中...';

      var codes = list.map(function(s) {
        var c = s.code.padStart(6, '0');
        if (c.charAt(0) === '6') return 'sh' + c;
        if (c.charAt(0) === '8' || c.charAt(0) === '9' || c.charAt(0) === '4') return 'bj' + c;
        return 'sz' + c;
      });

      var url = 'https://qt.gtimg.cn/q=' + codes.join(',');

      var old = document.getElementById('qt_script');
      if (old) old.remove();

      var timer = setTimeout(function() {
        status.innerHTML = '<span class="error">行情获取超时</span>';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      }, 8000);

      var script = document.createElement('script');
      script.id = 'qt_script';
      script.src = url;

      script.onload = function() {
        clearTimeout(timer);
        var found = 0;
        for (var i = 0; i < codes.length; i++) {
          var code = codes[i];
          var varName = 'v_' + code;
          var val = window[varName];
          if (val) {
            var fields = val.split('~');
            if (fields.length > 3) {
              var p = parseFloat(fields[3]);
              var yesterdayClose = parseFloat(fields[4]);
              if (!isNaN(p) && p > 0) {
                var changePct = (!isNaN(yesterdayClose) && yesterdayClose > 0) ? (p - yesterdayClose) / yesterdayClose * 100 : null;
                prices[code.replace(/^(sh|sz|bj)/, '')] = { price: p, changePct: changePct };
                found++;
              }
            }
            delete window[varName];
          }
        }
        status.textContent = found > 0
          ? '已更新 ' + found + '只 (' + new Date().toLocaleTimeString() + ')'
          : '行情获取失败';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      };

      script.onerror = function() {
        clearTimeout(timer);
        status.innerHTML = '<span class="error">行情获取失败（网络或跨域）</span>';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      };

      document.head.appendChild(script);
    });
  }

  /* -------- 按钮绑定 -------- */
  document.getElementById('addBtn').addEventListener('click', addStock);
  document.getElementById('refreshBtn').addEventListener('click', refreshAll);
  document.getElementById('clearBtn').addEventListener('click', clearAll);

  /* -------- Init -------- */
  render();
  refreshPrices().then(function() { render(); });
  setInterval(function() {
    refreshPrices().then(function() { render(); });
  }, 30000);
})();
</script>
</body>
</html>
