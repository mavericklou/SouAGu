<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓助手</title>
<link rel="manifest" href="https://cdn.jsdelivr.net/gh/mavericklou/SouAGu@0.0.3/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="持仓助手">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a73e8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.subtitle { font-size: 14px; font-weight: 400; color: #999; margin-bottom: 16px; }
.form-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; position: relative; }
.form-row input { flex: 1; min-width: 60px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
.form-row input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.12); }
.form-row button { padding: 8px 18px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.form-row button:hover { background: #1557b0; }
.form-row button:disabled { background: #bbb; cursor: default; }
#refreshBtn { background: #fff; color: #555; border: 1px solid #d0d5dd; padding: 8px 14px; font-size: 13px; }
#refreshBtn:hover { background: #f5f5f5; border-color: #bbb; color: #333; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
th, td { padding: 9px 8px; text-align: right; font-size: 13px; }
td:first-child { text-align: left; white-space: nowrap; }
th { background: #fafafa; font-weight: 500; color: #666; text-align: right; white-space: nowrap; }
td:first-child, th:first-child { text-align: left; }
td .ac-code { display: block; color: #999; font-size: 11px; line-height: 1.4; }
tr { border-bottom: 1px solid #f0f0f0; }
tr:last-child { border-bottom: none; }
.del { cursor: pointer; color: #e74c3c; font-size: 16px; padding: 0 4px; opacity: 0.4; }
.del:hover { opacity: 1; }
.up { color: #e74c3c; }
.down { color: #27ae60; }
.flat { color: #999; }
.summary { display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; flex-wrap: wrap; }
.summary span { font-weight: 600; }
.status { font-size: 12px; color: #999; margin-bottom: 10px; }
.error { color: #e74c3c; font-size: 12px; }
.empty { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; }
#stockSearchContainer { flex: 2; min-width: 120px; }
@media (max-width: 600px) {
  body { padding: 12px; }
  .form-row input { min-width: 45px; font-size: 13px; padding: 7px 8px; }
  #stockSearchContainer { min-width: 90px; }
  .form-row { gap: 4px; }
  th, td { padding: 6px 4px; font-size: 12px; }
  .summary { gap: 10px; font-size: 13px; }
}

/* -------- 添加到桌面按钮 -------- */
#installBtn {
  position: fixed; top: 14px; right: 14px; z-index: 9999;
  width: 38px; height: 38px; border-radius: 50%;
  border: none; background: rgba(26,115,232,0.12); color: #1a73e8;
  font-size: 18px; cursor: pointer; transition: background .2s, transform .15s;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
#installBtn:hover { background: rgba(26,115,232,0.22); transform: scale(1.08); }
#installBtn:active { transform: scale(0.94); }
#installBtn.hidden { display: none; }

/* -------- 遮罩层 / 弹窗 -------- */
#installOverlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
#installOverlay.show { display: flex; }
#installBox {
  background: #fff; border-radius: 16px; padding: 28px 24px 22px;
  max-width: 380px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  text-align: center; position: relative; animation: popIn .25s ease-out;
}
@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#installBox h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: #1d1d1f; }
#installBox .icon-big { font-size: 40px; margin-bottom: 8px; }
#installBox p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 4px; }
#installBox .steps { text-align: left; margin: 14px 0 18px; }
#installBox .step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 13px; color: #333; }
#installBox .step-num {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  background: #1a73e8; color: #fff; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
#installBox .close-btn {
  margin-top: 6px; padding: 8px 24px; border: none; border-radius: 8px;
  background: #1a73e8; color: #fff; font-size: 14px; cursor: pointer;
}
#installBox .close-btn:hover { background: #1557b0; }
#installBox .close-x {
  position: absolute; top: 10px; right: 14px; border: none; background: none;
  font-size: 20px; color: #999; cursor: pointer;
}
#installBox .close-x:hover { color: #333; }
</style>
</head>
<body>

<!-- 添加到桌面按钮 -->
<button id="installBtn" title="添加到桌面" aria-label="添加到桌面">📲</button>

<!-- 操作指引弹窗 -->
<div id="installOverlay" onclick="if(event.target===this)closeInstallOverlay()">
  <div id="installBox">
    <button class="close-x" onclick="closeInstallOverlay()">✕</button>
    <div class="icon-big" id="ovIcon">📲</div>
    <h3 id="ovTitle">添加到桌面</h3>
    <div id="ovBody"></div>
    <button class="close-btn" onclick="closeInstallOverlay()">知道了</button>
  </div>
</div>

<h1>📊 持仓助手</h1>
<div class="subtitle">支持代码/名称/拼音搜索 — 双击可开，无需服务器</div>

<div class="form-row">
  <div id="stockSearchContainer"></div>
  <input id="qty" type="number" placeholder="持股数" style="flex:0.7">
  <input id="cost" type="number" step="0.001" placeholder="成本价" style="flex:0.7">
  <button id="addBtn" disabled>添加</button>
  <button id="refreshBtn" title="刷新行情">刷新</button>
</div>

<div class="summary" id="summary"></div>
<div class="status" id="status">加载中...</div>

<table>
  <thead>
    <tr>
      <th>股票</th>
      <th>持股</th>
      <th>成本</th>
      <th>现价</th>
      <th>涨跌</th>
      <th>持仓金额</th>
      <th>盈亏</th>
      <th>收益率</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="empty" id="empty">在搜索框输入股票开始添加</div>

<!-- 通过 jsDelivr CDN 加载（无需下载，双击即可用） -->
<script src="https://cdn.jsdelivr.net/gh/mavericklou/SouAGu@0.0.3/stocks-data.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mavericklou/SouAGu@0.0.3/SouAGu.js"></script>
<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'portfolio_holdings';
  var selectedStock = null;
  var prices = {};

  /* -------- SouAGu 组件 -------- */
  var ss = new SouAGu('#stockSearchContainer', {
    placeholder: '股票代码/名称/拼音, e.g. 600036 / 招商 / ZSYH',
    width: '100%',
    zIndex: '100',
    theme: 'light'
  });

  // 从全局变量加载数据（file:// 兼容）
  ss.setData(window.__STOCKS_DATA);
  document.getElementById('status').textContent = '就绪 (' + ss.getData().length + '只股票)';

  ss.onSelect(function(stock) {
    selectedStock = stock;
    document.getElementById('addBtn').disabled = false;
    document.getElementById('qty').focus();
  });

  /* -------- Keydown 处理 -------- */
  document.getElementById('qty').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addStock();
  });
  document.getElementById('cost').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addStock();
  });

  /* -------- 存储 -------- */
  function loadList() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
  }
  function saveList(list) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }

  function render() {
    var list = loadList();
    var tbody = document.getElementById('tbody');
    var empty = document.getElementById('empty');
    var summary = document.getElementById('summary');

    if (list.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      summary.innerHTML = '';
      return;
    }
    empty.style.display = 'none';

    var totalCost = 0, totalMv = 0, totalPl = 0;
    var FEE_BUY = 0.00008;
    var FEE_SELL = 0.00008;
    var STAMP = 0.0005;

    var rows = list.map(function(s, i) {
      var p = prices[s.code];
      var price = p ? p.price : s.lastPrice;
      var changePct = p ? p.changePct : s.lastChangePct;
      var costVal = s.qty * s.cost;
      var buyFee = costVal * FEE_BUY;
      var costWithFees = costVal + buyFee;
      var mv = s.qty * (price || 0);
      var sellFee = mv * FEE_SELL;
      var stampDuty = mv * STAMP;
      var netVal = mv - sellFee - stampDuty;
      var pl = price ? (netVal - costWithFees) : 0;
      if (price) { totalCost += costWithFees; totalMv += mv; totalPl += pl; }

      var cls = price ? (pl > 0 ? 'up' : pl < 0 ? 'down' : 'flat') : '';
      return '<tr>' +
        '<td>' + s.name + '<span class="ac-code"> ' + s.code + '</span></td>' +
        '<td>' + fmt0(s.qty) + '</td>' +
        '<td>' + fmt(s.cost) + '</td>' +
        '<td>' + (price ? fmt(price) : '<span class="flat">--</span>') + '</td>' +
        '<td class="' + (changePct > 0 ? 'up' : changePct < 0 ? 'down' : 'flat') + '">' + (changePct != null ? (changePct > 0 ? '+' : '') + changePct.toFixed(2) + '%' : '--') + '</td>' +
        '<td>' + (price ? fmt(mv) : '<span class="flat">--</span>') + '</td>' +
        '<td class="' + cls + '">' + (price ? (pl > 0 ? '+' : '') + fmt(pl) : '--') + '</td>' +
        '<td class="' + cls + '">' + (price ? (plPct(netVal, costWithFees) > 0 ? '+' : '') + plPct(netVal, costWithFees).toFixed(2) + '%' : '--') + '</td>' +
        '<td><span class="del" data-index="' + i + '">✕</span></td>' +
      '</tr>';
    });
    tbody.innerHTML = rows.join('');

    // Bind delete clicks
    tbody.querySelectorAll('.del').forEach(function(el) {
      el.addEventListener('click', function() { removeStock(parseInt(el.dataset.index)); });
    });

    var totalPlPctVal = totalCost ? (totalPl / totalCost * 100) : 0;
    var cls = totalPl > 0 ? 'up' : totalPl < 0 ? 'down' : '';
    summary.innerHTML = '' +
      '<span>总成本: ' + fmt(totalCost) + '</span>' +
      '<span>总市值: ' + fmt(totalMv) + '</span>' +
      '<span class="' + cls + '">总盈亏: ' + (totalPl >= 0 ? '+' : '') + fmt(totalPl) + ' (' + (totalPlPctVal >= 0 ? '+' : '') + totalPlPctVal.toFixed(2) + '%)</span>';

    // Persist lastPrice
    var list2 = loadList();
    var changed = false;
    for (var i = 0; i < list2.length; i++) {
      var s = list2[i];
      var p = prices[s.code];
      if (p) {
        if (s.lastPrice !== p.price) { s.lastPrice = p.price; changed = true; }
        if (s.lastChangePct !== p.changePct) { s.lastChangePct = p.changePct; changed = true; }
      }
    }
    if (changed) saveList(list2);
  }

  function plPct(price, cost) { return cost ? ((price - cost) / cost * 100) : 0; }
  function fmt(n) { return n === undefined || n === null ? '--' : n.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function fmt0(n) { return n === undefined || n === null ? '--' : n.toLocaleString('zh-CN', {minimumFractionDigits:0, maximumFractionDigits:0}); }

  function addStock() {
    if (!selectedStock) return;
    var s = selectedStock;
    var qty = parseFloat(document.getElementById('qty').value);
    var cost = parseFloat(document.getElementById('cost').value);
    if (!qty || !cost) return;

    var list = loadList();
    list.push({ code: s.c, name: s.n, qty: qty, cost: cost, lastPrice: null, lastChangePct: null });
    saveList(list);

    ss.clear();
    document.getElementById('qty').value = '';
    document.getElementById('cost').value = '';
    document.getElementById('addBtn').disabled = true;
    selectedStock = null;
    document.getElementById('qty').focus();

    render();
    refreshPrices();
  }

  function removeStock(i) {
    var list = loadList();
    list.splice(i, 1);
    saveList(list);
    render();
  }

  function refreshAll() {
    refreshPrices().then(function() { render(); });
  }

  /* -------- Price fetch via Tencent HTTPS API -------- */
  function refreshPrices() {
    return new Promise(function(resolve) {
      var list = loadList();
      if (list.length === 0) { resolve(); return; }

      var status = document.getElementById('status');
      status.textContent = '获取行情中...';

      var codes = list.map(function(s) {
        var c = s.code.padStart(6, '0');
        if (c.charAt(0) === '6' || c.charAt(0) === '5') return 'sh' + c;
        if (c.charAt(0) === '8' || c.charAt(0) === '9' || c.charAt(0) === '4') return 'bj' + c;
        return 'sz' + c;
      });

      var url = 'https://qt.gtimg.cn/q=' + codes.join(',');

      var old = document.getElementById('qt_script');
      if (old) old.remove();

      var timer = setTimeout(function() {
        status.innerHTML = '<span class="error">行情获取超时</span>';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      }, 8000);

      var script = document.createElement('script');
      script.id = 'qt_script';
      script.src = url;

      script.onload = function() {
        clearTimeout(timer);
        var found = 0;
        for (var i = 0; i < codes.length; i++) {
          var code = codes[i];
          var varName = 'v_' + code;
          var val = window[varName];
          if (val) {
            var fields = val.split('~');
            if (fields.length > 3) {
              var p = parseFloat(fields[3]);
              var yesterdayClose = parseFloat(fields[4]);
              if (!isNaN(p) && p > 0) {
                var changePct = (!isNaN(yesterdayClose) && yesterdayClose > 0) ? (p - yesterdayClose) / yesterdayClose * 100 : null;
                prices[code.replace(/^(sh|sz|bj)/, '')] = { price: p, changePct: changePct };
                found++;
              }
            }
            delete window[varName];
          }
        }
        status.textContent = found > 0
          ? '已更新 ' + found + '只 (' + new Date().toLocaleTimeString() + ')'
          : '行情获取失败';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      };

      script.onerror = function() {
        clearTimeout(timer);
        status.innerHTML = '<span class="error">行情获取失败（网络或跨域）</span>';
        var s = document.getElementById('qt_script');
        if (s) s.remove();
        resolve();
      };

      document.head.appendChild(script);
    });
  }

  /* -------- 按钮绑定 -------- */
  document.getElementById('addBtn').addEventListener('click', addStock);
  document.getElementById('refreshBtn').addEventListener('click', refreshAll);

  /* -------- 判断 A 股开市时间（北京时间） -------- */
  function isMarketOpen() {
    var now = new Date();
    // 转成北京时间（UTC+8）
    var bj = new Date(+now + now.getTimezoneOffset() * 60000 + 8 * 3600000);
    var h = bj.getUTCHours();
    var m = bj.getUTCMinutes();
    // UTC 月份处理：getUTCMonth 0-11
    var dow = bj.getUTCDay(); // 0=周日, 6=周六
    var min = h * 60 + m;
    if (dow === 0 || dow === 6) return false; // 周末
    // 9:30-11:30 或 13:00-15:00
    return (min >= 570 && min < 690) || (min >= 780 && min < 900);
  }

  /* -------- Init -------- */
  render();
  refreshPrices().then(function() { render(); });
  setInterval(function() {
    if (isMarketOpen()) {
      refreshPrices().then(function() { render(); });
    }
  }, 30000);
})();

/* -------- 添加到桌面 (全局) -------- */
(function() {
  var btn = document.getElementById('installBtn');
  var ov = document.getElementById('installOverlay');
  var deferredPrompt = null;
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isInStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;

  // 已经是桌面版 → 隐藏按钮
  if (isInStandalone) { btn.classList.add('hidden'); return; }

  // Android Chrome: 捕获安装事件
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
  });

  // Android Chrome: 安装成功/失败后重置
  window.addEventListener('appinstalled', function() {
    deferredPrompt = null;
    btn.classList.add('hidden');
  });

  btn.addEventListener('click', function() {
    // 1) Android: 有 deferredPrompt → 触发系统安装弹窗
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
      return;
    }

    // 2) iOS → 显示指引
    if (isIOS) {
      document.getElementById('ovIcon').textContent = '🍎';
      document.getElementById('ovTitle').textContent = '添加到主屏幕';
      document.getElementById('ovBody').innerHTML =
        '<div class="steps">' +
          '<div class="step"><span class="step-num">1</span> 在 Safari 底部点击 <b>分享</b> 按钮 <span style="font-size:18px">⎙</span></div>' +
          '<div class="step"><span class="step-num">2</span> 向下滑动，找到 <b>"添加到主屏幕"</b></div>' +
          '<div class="step"><span class="step-num">3</span> 点右上角 <b>"添加"</b>，完成</div>' +
        '</div>' +
        '<p style="color:#999;font-size:12px">提示：请在 Safari 中打开此页面，而非微信/QQ 内置浏览器</p>';
      ov.classList.add('show');
      return;
    }

    // 3) Android 但没有 deferredPrompt（从 file:// 打开等）→ 通用指引
    document.getElementById('ovIcon').textContent = '📱';
    document.getElementById('ovTitle').textContent = '添加到桌面';
    var isAndroid = /Android/.test(navigator.userAgent);
    document.getElementById('ovBody').innerHTML = isAndroid
      ? '<div class="steps">' +
          '<div class="step"><span class="step-num">1</span> 在 Chrome 点右上角 <b>⋮ 菜单</b></div>' +
          '<div class="step"><span class="step-num">2</span> 选择 <b>"添加到主屏幕"</b></div>' +
          '<div class="step"><span class="step-num">3</span> 点 <b>"添加"</b>，完成</div>' +
        '</div>' +
        '<p style="color:#999;font-size:12px">提示：请通过 GitHub Pages 链接打开再试，可用系统安装弹窗</p>'
      : '<p>请在手机浏览器中打开此页面，使用浏览器的"添加到主屏幕"功能。</p>';
    ov.classList.add('show');
  });
})();

function closeInstallOverlay() {
  document.getElementById('installOverlay').classList.remove('show');
}
</script>
</body>
</html>
